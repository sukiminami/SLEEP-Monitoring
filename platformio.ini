; PlatformIO Project Configuration File

[env:4d_systems_esp32s3_gen4_r8n16]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino

; 添加 MQTT 库支持
lib_deps =
    knolleary/PubSubClient@^2.8

; USB CDC 串口配置 - 必须启用才能通过 USB 端口输出
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    -DUSE_BLUETOOTH=1
    -Wl,--no-map

; 串口监控配置
monitor_speed = 115200
monitor_port = AUTO

; 上传配置
upload_speed = 921600
upload_protocol = esptool

; 排除示例/测试文件，避免全局符号重复定义
build_src_filter =
    +<*>
    -<NetworkExample.cpp>
    -<NetworkTest.cpp>